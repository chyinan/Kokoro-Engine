name: Auto Code Review

on:
  pull_request_target:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
      contents: read

    steps:
      # 只 checkout base repo 的代码（包含 review 脚本），不执行 fork 代码
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          fetch-depth: 0

      - name: Get PR diff
        run: |
          git fetch origin pull/${{ github.event.pull_request.number }}/head:pr-branch
          git diff origin/${{ github.event.pull_request.base.ref }}...pr-branch > pr.diff
          SIZE=$(wc -c < pr.diff)
          echo "Diff size: ${SIZE} bytes"
          if [ "$SIZE" -gt 50000 ]; then
            echo "⚠️ Diff too large ($(($SIZE / 1024))KB), skipping review"
            echo "SKIP_REVIEW=true" >> $GITHUB_ENV
          fi

      - name: Set up Python
        if: env.SKIP_REVIEW != 'true'
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        if: env.SKIP_REVIEW != 'true'
        run: pip install anthropic

      - name: Review with Claude
        if: env.SKIP_REVIEW != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
        run: python scripts/review-pr.py pr.diff > review.md

      - name: Post review comment
        if: env.SKIP_REVIEW != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            if (!fs.existsSync('review.md')) return;
            const review = fs.readFileSync('review.md', 'utf8');
            if (!review.trim()) return;

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: review
            });

