name: Build macOS

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS App (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-15
            target: aarch64-apple-darwin
            release_suffix: macos-apple-silicon
          - arch: x64
            runner: macos-15-intel
            target: x86_64-apple-darwin
            release_suffix: macos-intel
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          key: macos-${{ matrix.arch }}

      - name: Install dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

      - name: Build macOS app (${{ matrix.arch }})
        env:
          APPLE_SIGNING_IDENTITY: "-"
        run: |
          cargo_bin="$(rustup which cargo)"
          rustc_bin="$(rustup which rustc)"
          export CARGO="$cargo_bin"
          export RUSTC="$rustc_bin"
          export PATH="$(dirname "$cargo_bin"):$HOME/.cargo/bin:$PATH"
          "$CARGO" metadata --manifest-path src-tauri/Cargo.toml --no-deps --format-version 1 >/dev/null
          npm run tauri build -- --target ${{ matrix.target }} --bundles app,dmg

      - name: Rename DMG for architecture
        run: |
          cd src-tauri/target/${{ matrix.target }}/release/bundle/dmg
          for file in *.dmg; do
            mv "$file" "${file%.dmg}-${{ matrix.release_suffix }}.dmg"
          done

      - name: List bundle output
        run: find src-tauri/target/${{ matrix.target }}/release/bundle -type f | sort

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: Kokoro-Engine-${{ matrix.release_suffix }}-dmg
          path: src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*-${{ matrix.release_suffix }}.dmg
          retention-days: 30

      - name: Upload APP artifact
        uses: actions/upload-artifact@v4
        with:
          name: Kokoro-Engine-${{ matrix.release_suffix }}-app
          path: src-tauri/target/${{ matrix.target }}/release/bundle/macos/Kokoro Engine.app
          retention-days: 30

  upload-release:
    name: Upload macOS Release Assets
    needs: build-macos
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download DMG artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: Kokoro-Engine-macos-*-dmg
          path: release-assets
          merge-multiple: true

      - name: List release assets
        run: find release-assets -type f | sort

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
