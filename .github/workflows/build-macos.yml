name: Build macOS

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-macos:
    name: Build macOS App
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

      - name: Build macOS app (arm64)
        env:
          APPLE_SIGNING_IDENTITY: "-"
        run: npm run tauri build -- --target aarch64-apple-darwin

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: Kokoro-Engine-macos-dmg
          path: src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.dmg
          retention-days: 30

      - name: Upload APP artifact
        uses: actions/upload-artifact@v4
        with:
          name: Kokoro-Engine-macos-app
          path: src-tauri/target/aarch64-apple-darwin/release/bundle/macos/Kokoro\ Engine.app
          retention-days: 30

      - name: Upload TAR.GZ artifact
        uses: actions/upload-artifact@v4
        with:
          name: Kokoro-Engine-macos-tar
          path: src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.tar.gz
          retention-days: 30

      - name: Rename files for release
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          cd src-tauri/target/aarch64-apple-darwin/release/bundle/macos
          for file in *.dmg; do
            mv "$file" "${file%.dmg}-macos.dmg"
          done
          for file in *.tar.gz; do
            mv "$file" "${file%.tar.gz}-macos.tar.gz"
          done

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*-macos.dmg
            src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*-macos.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
